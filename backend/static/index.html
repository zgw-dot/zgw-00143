<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剧场排练厅预约系统</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <div id="login-page" class="login-page">
            <div class="login-box">
                <h1>剧场排练厅预约系统</h1>
                <p class="subtitle">Theater Rehearsal Booking System</p>
                <form id="login-form">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="username" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="password" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">登录</button>
                </form>
                <div class="login-tips">
                    <p>测试账号：</p>
                    <p>管理员：admin / admin123</p>
                    <p>成员：lisi / 123456</p>
                </div>
            </div>
        </div>

        <div id="main-app" class="main-app" style="display:none;">
            <header class="app-header">
                <div class="header-left">
                    <h1>🎭 剧场排练厅预约系统</h1>
                </div>
                <div class="header-right">
                    <span id="user-info" class="user-info"></span>
                    <button id="logout-btn" class="btn btn-outline">退出</button>
                </div>
            </header>

            <nav class="app-nav">
                <button class="nav-tab active" data-tab="bookings">预约列表</button>
                <button class="nav-tab" data-tab="waitlist">候补补位</button>
                <button class="nav-tab" data-tab="new-booking">新建预约</button>
                <button class="nav-tab admin-only" data-tab="drill-center" style="display:none;">演练剧本中心</button>
                <button class="nav-tab admin-only" data-tab="config" style="display:none;">配置管理</button>
            </nav>

            <main class="app-content">
                <section id="tab-bookings" class="tab-content active">
                    <div class="filter-bar">
                        <div class="filter-item">
                            <label>剧目</label>
                            <input type="text" id="filter-production" placeholder="搜索剧目...">
                        </div>
                        <div class="filter-item">
                            <label>场地</label>
                            <select id="filter-venue">
                                <option value="">全部场地</option>
                            </select>
                        </div>
                        <div class="filter-item">
                            <label>状态</label>
                            <select id="filter-status">
                                <option value="">全部状态</option>
                                <option value="draft">草稿</option>
                                <option value="pending">待审</option>
                                <option value="confirmed">已确认</option>
                                <option value="rescheduling">改期中</option>
                                <option value="cancelled">已取消</option>
                            </select>
                        </div>
                        <div class="filter-item">
                            <button id="search-btn" class="btn btn-primary">搜索</button>
                            <button id="reset-btn" class="btn btn-outline">重置</button>
                            <button id="export-btn" class="btn btn-success">导出CSV</button>
                        </div>
                    </div>

                    <div class="booking-list-header">
                        <h2>预约列表</h2>
                        <span id="booking-count" class="count-badge"></span>
                    </div>

                    <div class="booking-list" id="booking-list">
                    </div>

                    <div class="pagination" id="pagination"></div>
                </section>

                <section id="tab-waitlist" class="tab-content">
                    <div class="filter-bar">
                        <div class="filter-item">
                            <label>剧目</label>
                            <input type="text" id="wl-filter-production" placeholder="搜索剧目...">
                        </div>
                        <div class="filter-item">
                            <label>场地</label>
                            <select id="wl-filter-venue">
                                <option value="">全部场地</option>
                            </select>
                        </div>
                        <div class="filter-item">
                            <label>状态</label>
                            <select id="wl-filter-status">
                                <option value="">全部状态</option>
                                <option value="waiting">排队中</option>
                                <option value="filled">已补位</option>
                                <option value="cancelled">已取消</option>
                                <option value="expired">已过期</option>
                            </select>
                        </div>
                        <div class="filter-item">
                            <button id="wl-search-btn" class="btn btn-primary">搜索</button>
                            <button id="wl-reset-btn" class="btn btn-outline">重置</button>
                            <button id="wl-create-btn" class="btn btn-primary">+ 登记候补</button>
                            <button id="wl-export-btn" class="btn btn-success admin-only" style="display:none;">导出CSV</button>
                        </div>
                    </div>

                    <div class="booking-list-header">
                        <h2>候补列表</h2>
                        <span id="wl-count" class="count-badge"></span>
                    </div>

                    <div class="booking-list" id="waitlist-list">
                    </div>

                    <div class="pagination" id="wl-pagination"></div>
                </section>

                <section id="tab-new-booking" class="tab-content">
                    <div class="form-card">
                        <h2 id="form-title">新建预约</h2>
                        <form id="booking-form">
                            <input type="hidden" id="booking-id">
                            <input type="hidden" id="booking-version">

                            <div class="form-row">
                                <div class="form-group">
                                    <label>标题 *</label>
                                    <input type="text" id="booking-title" placeholder="请输入预约标题" required>
                                </div>
                                <div class="form-group">
                                    <label>剧目 *</label>
                                    <input type="text" id="booking-production" placeholder="请输入剧目名称" list="production-list" required>
                                    <datalist id="production-list"></datalist>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>场地 *</label>
                                    <select id="booking-venue" required></select>
                                </div>
                                <div class="form-group">
                                    <label>优先级</label>
                                    <input type="number" id="booking-priority" value="10" min="1" max="100">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>开始时间 *</label>
                                    <input type="datetime-local" id="booking-start" required>
                                </div>
                                <div class="form-group">
                                    <label>结束时间 *</label>
                                    <input type="datetime-local" id="booking-end" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>备注</label>
                                <textarea id="booking-notes" rows="3" placeholder="请输入备注信息"></textarea>
                            </div>

                            <div id="conflict-warning" class="conflict-warning" style="display:none;">
                                <h3>⚠️ 冲突检测</h3>
                                <div id="conflict-details"></div>
                            </div>

                            <div class="form-actions">
                                <button type="button" id="check-conflict-btn" class="btn btn-outline">检测冲突</button>
                                <button type="button" id="save-draft-btn" class="btn btn-secondary">保存草稿</button>
                                <button type="submit" class="btn btn-primary">提交审批</button>
                            </div>
                        </form>
                    </div>
                </section>

                <section id="tab-config" class="tab-content">
                    <div class="config-sections">
                        <div class="config-section">
                            <h2>🏢 场地管理</h2>
                            <div id="venue-list" class="config-list"></div>
                        </div>

                        <div class="config-section">
                            <h2>📅 封场日期</h2>
                            <div class="add-form">
                                <input type="date" id="new-closed-date">
                                <select id="new-closed-venue">
                                    <option value="">全部场地</option>
                                </select>
                                <input type="text" id="new-closed-reason" placeholder="封场原因">
                                <button id="add-closed-date-btn" class="btn btn-primary">添加</button>
                            </div>
                            <div id="closed-date-list" class="config-list"></div>
                        </div>

                        <div class="config-section">
                            <h2>⏰ 临时封场窗口（小时级）</h2>
                            <div class="add-form">
                                <select id="new-window-venue">
                                    <option value="">全部场地</option>
                                </select>
                                <input type="datetime-local" id="new-window-start" title="开始时间">
                                <input type="datetime-local" id="new-window-end" title="结束时间">
                                <input type="text" id="new-window-reason" placeholder="封场原因（如：设备检修、舞台联排）">
                                <button id="add-closed-window-btn" class="btn btn-primary">添加</button>
                            </div>
                            <div id="closed-window-list" class="config-list"></div>
                        </div>

                        <div class="config-section">
                            <h2>⚡ 优先级规则</h2>
                            <div id="priority-list" class="config-list"></div>
                        </div>
                    </div>
                </section>

                <section id="tab-drill-center" class="tab-content">
                    <div class="drill-tabs">
                        <button class="drill-subtab active" data-subtab="scripts">📜 剧本列表</button>
                        <button class="drill-subtab" data-subtab="batches">📦 演练批次</button>
                    </div>

                    <div id="drill-subtab-scripts" class="drill-subtab-content active">
                        <div class="filter-bar">
                            <div class="filter-item">
                                <label>关键词</label>
                                <input type="text" id="script-keyword" placeholder="搜索剧本名称/描述...">
                            </div>
                            <div class="filter-item">
                                <label>状态</label>
                                <select id="script-status">
                                    <option value="">全部</option>
                                    <option value="true">启用</option>
                                    <option value="false">停用</option>
                                </select>
                            </div>
                            <div class="filter-item">
                                <button id="script-search-btn" class="btn btn-primary">搜索</button>
                                <button id="script-reset-btn" class="btn btn-outline">重置</button>
                                <button id="script-create-btn" class="btn btn-primary">+ 新建剧本</button>
                                <button id="script-default-btn" class="btn btn-success">+ 使用默认模板</button>
                                <button id="script-import-btn" class="btn btn-secondary">📥 导入JSON</button>
                                <input type="file" id="script-import-file" accept=".json" style="display:none;">
                            </div>
                        </div>

                        <div class="booking-list-header">
                            <h2>演练剧本列表</h2>
                            <span id="script-count" class="count-badge"></span>
                        </div>

                        <div class="booking-list" id="script-list"></div>
                    </div>

                    <div id="drill-subtab-batches" class="drill-subtab-content">
                        <div class="filter-bar">
                            <div class="filter-item">
                                <label>剧本</label>
                                <select id="batch-filter-script">
                                    <option value="">全部剧本</option>
                                </select>
                            </div>
                            <div class="filter-item">
                                <label>状态</label>
                                <select id="batch-filter-status">
                                    <option value="">全部状态</option>
                                    <option value="pending">待执行</option>
                                    <option value="running">执行中</option>
                                    <option value="completed">已完成</option>
                                    <option value="failed">失败</option>
                                    <option value="rolled_back">已回滚</option>
                                    <option value="recovering">恢复中</option>
                                </select>
                            </div>
                            <div class="filter-item">
                                <button id="batch-search-btn" class="btn btn-primary">搜索</button>
                                <button id="batch-reset-btn" class="btn btn-outline">重置</button>
                            </div>
                        </div>

                        <div class="booking-list-header">
                            <h2>演练批次列表</h2>
                            <span id="batch-count" class="count-badge"></span>
                        </div>

                        <div class="booking-list" id="batch-list"></div>
                    </div>
                </section>
            </main>
        </div>

        <div id="booking-detail-modal" class="modal" style="display:none;">
            <div class="modal-content large-modal">
                <div class="modal-header">
                    <h2 id="detail-title">预约详情</h2>
                    <button class="modal-close">&times;</button>
                </div>
                <div class="modal-body" id="detail-body"></div>
                <div class="modal-footer" id="detail-footer"></div>
            </div>
        </div>

        <div id="reschedule-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>改期申请</h2>
                    <button class="modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>原时段</label>
                        <input type="text" id="reschedule-original" readonly class="readonly-input">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>新开始时间 *</label>
                            <input type="datetime-local" id="reschedule-start" required>
                        </div>
                        <div class="form-group">
                            <label>新结束时间 *</label>
                            <input type="datetime-local" id="reschedule-end" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>改期原因 *</label>
                        <textarea id="reschedule-reason" rows="3" placeholder="请输入改期原因" required></textarea>
                    </div>
                    <div id="reschedule-conflict" class="conflict-warning" style="display:none;"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline modal-close-btn">取消</button>
                    <button id="reschedule-submit-btn" class="btn btn-primary">提交改期</button>
                </div>
            </div>
        </div>

        <div id="waitlist-detail-modal" class="modal" style="display:none;">
            <div class="modal-content large-modal">
                <div class="modal-header">
                    <h2 id="wl-detail-title">候补详情</h2>
                    <button class="modal-close">&times;</button>
                </div>
                <div class="modal-body" id="wl-detail-body"></div>
                <div class="modal-footer" id="wl-detail-footer"></div>
            </div>
        </div>

        <div id="waitlist-create-modal" class="modal" style="display:none;">
            <div class="modal-content large-modal">
                <div class="modal-header">
                    <h2>登记候补</h2>
                    <button class="modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="waitlist-create-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>剧目 *</label>
                                <input type="text" id="wl-production" placeholder="请输入剧目名称" required>
                            </div>
                            <div class="form-group">
                                <label>场地 *</label>
                                <select id="wl-venue" required></select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>目标开始时间 *</label>
                                <input type="datetime-local" id="wl-start" required>
                            </div>
                            <div class="form-group">
                                <label>目标结束时间 *</label>
                                <input type="datetime-local" id="wl-end" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>前浮动（分钟）</label>
                                <input type="number" id="wl-before" value="60" min="0">
                            </div>
                            <div class="form-group">
                                <label>后浮动（分钟）</label>
                                <input type="number" id="wl-after" value="60" min="0">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>优先级（越大越优先）</label>
                            <input type="number" id="wl-priority" value="10" min="1" max="100">
                        </div>
                        <div class="form-group">
                            <label>备注</label>
                            <textarea id="wl-notes" rows="2" placeholder="选填"></textarea>
                        </div>
                        <div id="wl-create-warn" class="conflict-warning" style="display:none;"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline modal-close-btn">取消</button>
                    <button id="wl-submit-btn" class="btn btn-primary">提交候补</button>
                </div>
            </div>
        </div>

        <div id="script-create-modal" class="modal" style="display:none;">
            <div class="modal-content large-modal">
                <div class="modal-header">
                    <h2 id="script-modal-title">新建演练剧本</h2>
                    <button class="modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="script-create-form">
                        <input type="hidden" id="script-id">
                        <div class="form-row">
                            <div class="form-group">
                                <label>剧本名称 *</label>
                                <input type="text" id="script-name" placeholder="请输入剧本名称" required>
                            </div>
                            <div class="form-group">
                                <label>版本</label>
                                <input type="text" id="script-version" value="1.0">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>描述</label>
                            <textarea id="script-description" rows="2" placeholder="请输入剧本描述"></textarea>
                        </div>
                        <div class="form-group">
                            <label>场地规则 (JSON)</label>
                            <textarea id="script-venue-rules" rows="4"
                                      placeholder='{"venue_ids":[],"auto_find_slot":true,"search_days":30}'></textarea>
                        </div>
                        <div class="form-group">
                            <label>演练样本 (JSON数组)</label>
                            <textarea id="script-drill-samples" rows="4"
                                      placeholder='[{"name":"样本1","type":"waiting","priority":10}]'></textarea>
                        </div>
                        <div class="form-group">
                            <label>成员账号 (JSON数组)</label>
                            <textarea id="script-member-accounts" rows="4"
                                      placeholder='[{"username":"user1","password":"pass","full_name":"用户1","role":"member"}]'></textarea>
                        </div>
                        <div class="form-group">
                            <label>检查点 (JSON数组)</label>
                            <textarea id="script-checkpoints" rows="4"
                                      placeholder='[{"name":"检查点1","description":"","expected":"passed"}]'></textarea>
                        </div>
                        <div class="form-group">
                            <label>清理策略 (JSON)</label>
                            <textarea id="script-cleanup-strategy" rows="3"
                                      placeholder='{"auto_cleanup_on_success":false,"keep_logs":true}'></textarea>
                        </div>
                        <div id="script-create-warn" class="conflict-warning" style="display:none;"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline modal-close-btn">取消</button>
                    <button id="script-submit-btn" class="btn btn-primary">保存剧本</button>
                </div>
            </div>
        </div>

        <div id="batch-detail-modal" class="modal" style="display:none;">
            <div class="modal-content large-modal">
                <div class="modal-header">
                    <h2 id="batch-detail-title">批次详情</h2>
                    <button class="modal-close">&times;</button>
                </div>
                <div class="modal-body" id="batch-detail-body"></div>
                <div class="modal-footer" id="batch-detail-footer"></div>
            </div>
        </div>

        <div id="script-detail-modal" class="modal" style="display:none;">
            <div class="modal-content large-modal">
                <div class="modal-header">
                    <h2 id="script-detail-title">剧本详情</h2>
                    <button class="modal-close">&times;</button>
                </div>
                <div class="modal-body" id="script-detail-body"></div>
                <div class="modal-footer" id="script-detail-footer"></div>
            </div>
        </div>

        <div id="batch-create-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>创建演练批次</h2>
                    <button class="modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>选择剧本 *</label>
                        <select id="batch-create-script" required></select>
                    </div>
                    <div class="form-group">
                        <label>选择场地（可选，留空使用剧本默认）</label>
                        <select id="batch-create-venue">
                            <option value="">使用剧本默认</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline modal-close-btn">取消</button>
                    <button id="batch-submit-btn" class="btn btn-primary">创建批次</button>
                </div>
            </div>
        </div>

        <div id="toast" class="toast" style="display:none;"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
